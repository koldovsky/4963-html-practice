<section class="newsletter">
  <div class="newsletter__container">
    <div class="newsletter__content">
      <p class="newsletter__subtitle">Join</p>
      <h2 class="newsletter__title">Join Our Newsletter Now</h2>
      <p class="newsletter__description">
        Learn more about wines and our special offers with our weekly digests.
      </p>
    </div>
    <form class="newsletter__form" action="#" method="post">
      <input
        class="newsletter__input"
        type="email"
        placeholder="Enter your email address here"
        name="email"
        required
      />
      <button class="newsletter__button" type="submit">Submit</button>
    </form>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/VGUKEIR7-ss?si=DIFeE4WHHBEotntP"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2330.3762622381205!2d24.028154356203274!3d49.84351612722406!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x473add72f9bc6a89%3A0xf9783fecb4fecf1f!2sLviv%20National%20Opera!5e0!3m2!1sen!2sua!4v1772641794485!5m2!1sen!2sua"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
</section>
